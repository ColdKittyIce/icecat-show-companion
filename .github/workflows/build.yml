name: Build Windows EXE

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          $ctk = python -c "import customtkinter, os; print(os.path.dirname(customtkinter.__file__))"
          pyinstaller main.py --onefile --windowed `
            --name "IceCat_Companion_v3.0" `
            --add-data "help.html;." `
            --add-data "$ctk;customtkinter" `
            --hidden-import customtkinter `
            --hidden-import tkinterdnd2 `
            --hidden-import pygame `
            --hidden-import pygame.mixer `
            --hidden-import sounddevice `
            --hidden-import numpy `
            --hidden-import pycaw `
            --hidden-import pycaw.pycaw `
            --hidden-import pycaw.utils `
            --hidden-import pycaw.constants `
            --hidden-import comtypes `
            --hidden-import comtypes.client `
            --hidden-import pedalboard `
            --hidden-import keyboard `
            --hidden-import pyperclip `
            --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: IceCat-Companion-EXE
          path: dist/IceCat_Companion_v3.0.exe
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: IceCat Show Companion ${{ github.ref_name }}
          body: |
            ## IceCat Show Companion ${{ github.ref_name }}
            👇 Download `IceCat_Companion_v3.0.exe` below — no Python required.
            Windows may show SmartScreen on first run — click More info then Run anyway.
          files: dist/IceCat_Companion_v3.0.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
